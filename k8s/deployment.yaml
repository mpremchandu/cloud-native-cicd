apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-native-app-deployment
  labels:
    app: cloud-native-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloud-native-app
  template:
    metadata:
      labels:
        app: cloud-native-app
    spec:
      containers:
      - name: web-app
        image: YOUR_DOCKERHUB_USERNAME/cloud-native-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
